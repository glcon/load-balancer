services:
  balancer:
    build: .
    ports:
      - "8080:8080"
      - "9090:9090"
    volumes:
      - ./config.yml:/app/config.yml 
    depends_on:
      - backend1
      - backend2
      - backend3
      - backend4
      - backend5

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9091:9090" # maps it to http://localhost:9091
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - balancer

  backend1:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "8081:5678"

  backend2:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "8082:5678"

  backend3:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "8083:5678"

  backend4:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "8084:5678"

  backend5:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "8085:5678"